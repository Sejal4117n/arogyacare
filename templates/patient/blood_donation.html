{% extends "base.html" %}
{% block title %}Blood Donation · ArogyaCare{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 mb-2">Blood Donation</h1>
        <p class="text-muted mb-4">Please fill this form to register as a donor.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="donor_name" required minlength="2">
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" name="age" required min="1" max="120">
          </div>
          <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="gender" required>
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Blood Group</label>
            <select class="form-select" name="blood_group" required>
              <option value="">Select</option>
              {% for bg in blood_groups %}
              <option value="{{ bg }}">{{ bg }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" name="phone" required>
          </div>
          <div class="mb-4">
            <label class="form-label">City</label>
            <input type="text" class="form-control" name="city" required>
          </div>
          <button class="btn btn-primary">Submit Donation</button>
          <a class="btn btn-outline-secondary ms-2" href="{{ url_for('blood_request') }}">Need blood?</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
